<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <title>All Tourism Assistant Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5faf8;
        color: #10201f;
      }
      main {
        width: min(460px, 100%);
        border: 1px solid #cce8e3;
        border-radius: 12px;
        background: white;
        padding: 28px;
        box-shadow: 0 18px 60px rgba(15, 118, 110, 0.16);
      }
      .mark {
        width: 52px;
        height: 52px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: #0f766e;
        color: white;
        font-weight: 800;
        font-size: 24px;
      }
      h1 {
        margin: 18px 0 10px;
        font-size: 28px;
      }
      p {
        margin: 0;
        line-height: 1.6;
        color: #52615f;
      }
      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        margin-top: 22px;
        padding: 0 16px;
        border-radius: 10px;
        background: #0f766e;
        color: white;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">T</div>
      <h1>You are offline</h1>
      <p>All Tourism Assistant saved the app shell for offline access. Reconnect to refresh live listings, AI trip planning, maps, and booking links.</p>
      <a href="/">Back to All Tourism Assistant</a>
    </main>
  </body>
</html>
